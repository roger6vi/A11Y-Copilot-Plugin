## [V0.9.0] — 2026-04-23

### Resumen
Pulido visual de los cards de containers en Specs view: el padding inferior del card se colapsa cuando no hay bottom row, eliminando el efecto de "fila vacía" entre el final del metadata expandido y el borde del card.

### Correcciones
- Los cards de containers (Wrapper, List, Screen, Carousel) con MetadataDetail expandido en Specs view ya no muestran un espacio visible entre la última fila de metadata (por ejemplo "Dev docs") y el borde inferior del card. El padding-bottom del card se colapsa a 0 cuando no hay bottom row, y el propio padding interno de cada fila del metadata sigue dando el respiro necesario.

## [V0.8.7] — 2026-04-22

### Resumen
Fix crítico de usabilidad: el botón "Clear" del footer ya no borra todas las etiquetas del frame y sus descendientes. Ahora limpia exclusivamente el tag del nodo que tengas seleccionado, evitando pérdidas accidentales masivas de trabajo.

### Correcciones
- El botón "Clear" del footer borra ÚNICAMENTE el tag del nodo seleccionado. Antes iteraba el frame completo y borraba cualquier nodo con tag authored, lo que hacía trivialmente fácil perder toda una sesión de tagging con un click.
- El botón se deshabilita cuando no hay un nodo seleccionado o cuando el nodo seleccionado no tiene tag que limpiar. La intención queda clara visualmente.
- Para el comportamiento en cascada (nodo + descendientes) sigue existiendo la opción explícita en Ajustes → "Clear selected nodes", donde el usuario confirma el alcance antes de aplicar.

### Internas
- Nuevo flag \`canClearSelectedTag\` en el hook \`useFrameSession\`, que decide si el botón Clear del footer está habilitado.
- \`clearLocalTags\` ahora lee \`selection.nodeId\` y emite un postMessage de un solo nodo (en vez de iterar \`session.nodes\` completo).

### Links
- Commit: \`aac2a01\`


## [V0.8.6] — 2026-04-22

### Resumen
La selección de un sub-frame en el canvas ya no cambia el scope del análisis. El plugin siempre resuelve al FRAME contenedor más externo (la "pantalla"), de modo que puedes seleccionar cualquier nodo interno (un botón, un wrapper anidado como \`button-group\`) y la Specs view / Edit view seguirán mostrando el árbol completo de la pantalla analizada.

### Correcciones
- Al seleccionar un sub-frame (\`button-group\`, \`_menu\` o cualquier FRAME anidado dentro de otro), el plugin ya no se "mete" en ese sub-frame y restringe la vista a su subtree. Se sube hasta el FRAME más externo cuyo parent es una PAGE y se analiza esa pantalla completa.
- Se respeta SECTION como barrera: si un FRAME está dentro de una Section de Figma, se considera outermost a ese FRAME (no se atraviesa la SECTION, porque SECTION es un organizador visual de Figma, no un contenedor accesible).
- Casos sin FRAME ancestor (selección dentro de un COMPONENT suelto o un nodo top-level que no es FRAME) caen al fallback anterior vía \`findNearestScannableContainer\` — comportamiento no cambia.

### Internas
- Nueva función pura \`findOutermostFrameContainer\` en \`frameScanner.ts\` que reemplaza el uso de \`findNearestFrameContainer\` en los dos call sites que resuelven el frame activo desde la selección del usuario: \`selectionListener.ts\` y \`frameSessionAutoRefresh.ts\`.
- \`findNearestFrameContainer\` se mantiene exportada para eventual uso futuro — no hay otros consumers.

### Links
- Commit: \`a6ad62d\`


## [V0.8.5] — 2026-04-22

### Resumen
Ajuste visual en la ubicación de las flechas de reorder del TagRow. La V0.8.4 movió ambas flechas al top row, lo cual rompió la simetría visual UP-arriba / DOWN-abajo en los nodos con bottom row. Ahora el comportamiento es híbrido según el tipo de fila.

### Correcciones
- En TagRows con bottom row (nodos con campo semántico "Accessible name" + state badge): la flecha UP vive en el top row y la flecha DOWN en el bottom row, recuperando la simetría visual original.
- En TagRows sin bottom row (containers: Wrapper, List, Screen, Carousel): ambas flechas UP y DOWN viven juntas en el top row para que los containers sigan pudiendo bajar en la lista aunque no tengan segunda fila.

## [V0.8.4] — 2026-04-22

### Resumen
Los contenedores (Wrapper, List, Screen, Carousel) ahora muestran también la flecha DOWN del reorder cuando pueden bajar entre sus hermanos. Antes solo se veía la flecha UP porque la DOWN vivía en el bottom row del TagRow, que los containers no renderizan.

### Correcciones
- Ambas flechas de reorder (UP y DOWN) viven ahora juntas en la fila superior del TagRow. Los contenedores, que no tienen bottom row (porque no exponen el campo semántico de Accessible name ni el state badge), vuelven a poder bajar hacia abajo en la lista de hermanos visibles. Caso típico: Topbar en la primera posición bajo DPAG puede bajar por debajo de \`_menu\`, heading-3, etc. sin perder coherencia.

## [V0.8.3] — 2026-04-22

### Resumen
El reorder de nodos con las flechas up/down del Edit view ahora funciona como espera el usuario: respeta la jerarquía visible del plugin en lugar de la jerarquía raw de Figma. Antes, si un nodo taggueado vivía dentro de un frame no tagueado (un wrapper transparente para el plugin), las flechas del plugin prometían mover el nodo entre sus hermanos visibles, pero el cambio se descartaba silenciosamente al persistir.

### Correcciones
- El \`childOrder\` persistido ahora es relativo al grupo de hermanos del display-tree (los nodos que comparten el mismo display-parent según la jerarquía visible del plugin). Si tienes un Button tagueado dentro de un Frame no tagueado intermedio, puedes moverlo arriba o abajo entre sus hermanos visibles (otros tagged siblings bajo el mismo ancestro visible) y el cambio se guarda correctamente.
- La canonicalización de \`childOrder\` ya no descarta reordenamientos válidos cuando los nodos son singletons en sus raw Figma siblings pero hermanos legítimos en el display-tree. Esto era el caso típico con patrones como \`Topbar\` + \`Menu Items\` hijos de un \`_menu\` wrapper no tagueado, ambos visibles como hermanos bajo \`DPAG\` en el plugin.

### Internas
- Nuevo campo \`ancestorChain: string[]\` en \`A11yNodeSession\` poblado por \`frameScanner\` al escanear cada nodo. Permite resolver el display-parent de cualquier nodo sin necesitar el mapa completo de nodos untagged en el UI.
- Nueva función pura \`resolveDisplayParentIdMap\` en \`previewTree.ts\` que resuelve el display-parent de cada nodo authored caminando su \`ancestorChain\` filtrado por el conjunto authored actual.
- \`canonicalizeRedundantDraftChildOrder\` en \`frameSession.ts\` pre-filtra con \`filterDisplayCandidates\` para excluir ancestros untagged antes de agrupar. Si el display-grouping difiere entre base y draft (por ejemplo, el usuario acaba de taguear un container intermedio), no se canonicaliza — se preserva el \`childOrder\` del draft.
- No se toca el raw tree de Figma bajo ninguna circunstancia — el fix es puramente a nivel de metadata del plugin. Los prototipos de Figma quedan intactos.
- El cambio siguió el ciclo completo SDD (explore → propose → spec → design → tasks → apply → verify) con verify iter-2 por parte de Codex que detectó fixtures de test falso-verde en iter-1 y forzó una segunda iteración con escenarios que reflejan el runtime real.

### Links
- Commit: \`0dbdfe9\`


## [V0.8.2] — 2026-04-22

### Resumen
Pulido visual y de comportamiento de la fila inline del TagRow: el campo de Accessible name ya no muestra valores heredados cuando el reading order está apagado, los textos largos no se desbordan fuera de la caja y todas las "cajitas" (Role, State, mode Mic, TextPicker) mantienen altura coherente en cualquier preferencia de tamaño de fuente.

### Correcciones
- Cuando desactivas el reading order en un nodo, el input de Accessible name queda disabled con solo el placeholder visible. Antes seguía mostrando el valor heredado del mainComponent (por ejemplo "Juan" en un carousel), generando una experiencia incoherente con el mic + placeholder + valor.
- El wrapper del textarea vuelve a crecer con texto largo aunque no tenga saltos de línea explícitos. Antes, con word-wrap natural, el textarea se extendía fuera de la tarjeta porque el contenedor quedaba fijo en 20px.
- Los triggers Role, State, mode Mic y TextPicker ya no usan altura fija: usan \`min-h-5\` y crecen en sincronía con el textarea cuando subes el tamaño de fuente desde Preferences. Así la fila se mantiene pareja con cualquier \`--ui-font-scale\`.

### Internas
- \`line-height: 18px\` fijo en los spans internos de los triggers para eliminar el subpixel rounding entre el trigger y el wrapper del textarea. Alinea el content area de ambos al mismo valor entero.
- Nuevos tests de regresión en \`vitest/tagList.test.tsx\` que cubren: coherencia del input con reading off, crecimiento del textarea con wrap natural, y la invariante de que los triggers nunca vuelvan a \`!h-5\` fijo.

- Commits: \`54f8f81\`, \`ce0253a\`


## [V0.8.1] — 2026-04-22

Los containers (Wrapper, List, Screen) estrenan el mismo mecanismo de enlace de documentación por defecto que los roles, más un pulido visual de la fila inferior del TagRow que corrige una altura desalineada y unifica los bordes redondeados.

## [V0.8.0] — 2026-04-22

### Resumen
Cada rol del catálogo de accesibilidad puede ahora llevar su enlace de documentación canónico centralizado. Al asignar un rol, el campo Dev docs se rellena solo con el link correcto — sin tener que pegar la misma URL una y otra vez por cada tag.

### Novedades
- **Dev docs por rol**: \`ROLE_DEFINITIONS\` admite un campo \`docUrl\` por entrada. Al seleccionar o cambiar el rol, si el usuario no había escrito un custom, el campo se rellena automáticamente con el URL del rol nuevo (comparación por valor).
- **Botón Restore** en el modal de Dev docs: aparece cuando el rol tiene un default distinto al valor actual y repone el URL del rol con un clic.
- **Tooltip del badge overflow** ahora lista los campos activos (\`Dev docs · Product notes · Custom attribute\`) en lugar de solo el conteo.
- **Active state** en los items del kebab: los slots con contenido se renderizan con un pill invertido (icono sobre fondo oscuro) para distinguirlos del resto de un vistazo.

### Cambios
- **Layout del modal de Dev docs** reorganizado: el botón Open pasa a icon-only inline a la derecha del input; Restore y Save comparten una fila encima de Cancel.
- Slot \`docUrl: undefined\` explícito en los 22 roles de \`ROLE_DEFINITIONS\` para facilitar el poblado centralizado.
- El rol \`button\` estrena su primer URL real (enlace al componente Button en Figma Design). Los otros 21 roles siguen esperando URL.

### Internas
- Nueva helper de tests \`nullifyAllRoleDocUrls\` para aislar tests que no dependen del catálogo poblado.
- 15 tests nuevos cubren la lógica de propuesta docUrl (T-PROP-1..T-PROP-8) y el botón Restore en el dialog (T-UI-1..T-UI-7).
- Defensa de guarda en \`buildRoleProposalPatch\` que evita escribir \`docUrl: undefined\` cuando ni el rol anterior ni el siguiente tienen default.
- Clave i18n obsoleta \`editor.overflowActiveCount\` eliminada en los 5 idiomas; nueva clave \`editor.docUrlRestore\` añadida.


## [V0.7.9] — 2026-04-22

### Resumen
Release de documentación: el README se convierte en un manual de usuario completo (977 líneas) que acompaña al diseñador desde el onboarding hasta la referencia detallada de cada feature. Incluye también dos correcciones de inconsistencias entre documentación previa y código real (el overlay visual y una key i18n huérfana).

- **README como manual de uso completo**: nuevas secciones de Primeros pasos (recorrido de 60 segundos), Anatomía de la interfaz (tour con diagrama ASCII), Modo diseño con 7 subsecciones, Herencia y reutilización (modelo de instance/component/variant/copia), Validaciones en tiempo real, Referencia completa de los 22 roles semánticos, referencia de estados, Settings detallado y Tips y mejores prácticas.

### Correcciones
- **Referencia al "overlay visual en canvas" eliminada**: el README anterior describía un overlay que el plugin dibujaría sobre el canvas (flechas numeradas de reading/focus order). Verificando el código, esa feature no existe — el único feature visual es el blueprint nativo que usa \`AnnotationsMixin\` (annotations de Figma), no dibujo directo en canvas. Se eliminan las menciones al overlay de Primeros pasos, Vista de specs y Dev Mode.

- README pasa de 328 a 977 líneas, +783 insertions / -147 deletions sobre el anterior.

## [V0.7.8] — 2026-04-22

### Resumen
Completa la feature de Custom attributes: habilita el ítem "Custom attribute" del overflow menu del TagRow (que estaba como stub desde V0.7.7) para que diseñadores puedan añadir pares clave-valor arbitrarios a cualquier elemento tagueado. Los atributos se heredan del componente padre (origin) igual que el resto de los tags, y ofrecen un botón Restaurar que replica el patrón de refresh ya presente en los slots semánticos.

### Novedades
- **Custom attributes**: nuevo modal accesible desde el ítem "Custom attribute" del kebab overflow. Soporta añadir/eliminar filas de clave+valor con texto libre en ambos campos. Sin tope de entradas.
- **Render en el panel de detalle**: cada entrada se muestra como fila \`Clave: valor\` en el \`MetadataDetail\`, justo después de Dev docs y alineado con Role/Status/Label.
- **Herencia desde el component parent**: las instancias toman los custom attributes del componente de origen; un override local reemplaza los valores heredados. El botón Restaurar vuelve a la herencia en un click.
- **Botón Restaurar con patrón refresh**: siempre visible, habilitado solo cuando el draft actual difiere de los valores del parent. Inspirado en el mismo mecanismo que usan heading / textAlt / reading.
- **Badge contador extendido**: el círculo junto al kebab ahora suma +1 si el tag tiene al menos un custom attribute activo (además de Dev docs y Notes).

### Cambios
- El ítem "Custom attribute" del overflow menu pasa de disabled con pill "Soon" a habilitado con icono \`Sparkles\`.
- Layout del footer del modal: Restaurar y Save quedan agrupados inline con gap de 4 px incluso cuando el footer se apila en el panel angosto; Cancel queda separado abajo.
- Extensión de \`FlowBadge\` a 3 fuentes de conteo sin cambios para los callers existentes.

### Correcciones
- Al hacer click en Restaurar, el modal ya no se cierra: los inputs se refrescan in-place con los valores del parent y el botón queda disabled hasta que el draft vuelva a diferir.
- \`customAttributes\` entra en el flujo de clear-tags como el resto de los campos inheritables (se limpia junto con Role/Status/Label al hacer reset del nodo).

### Internas
- \`NodeTagData.customAttributes?: { key: string; value: string }[] | null\` añadido al tipo + \`TAG_DEFAULTS\` + \`LOCAL_FIELDS\` + \`SOURCE_ORIGIN_FIELDS\` en una edición atómica (la triple-atomic para evitar silent-drop al normalizar).
- Parse defensivo doble (en \`parseTagData\` y \`parsePersistedSourceOrigin\`): \`Array.isArray\` + shape filter para ignorar silenciosamente entradas malformadas en pluginData existente.
- 10 claves i18n nuevas en 5 locales (en/es/ca/gl/eu); eliminada \`editor.customAttrSoon\`.
- 75 tests nuevos, suite completa pasa 631/631.
- Workflow SDD completo aplicado: explore → proposal → spec → design → tasks → apply → verify → archive (8 fases, 12 commits locales).

## [V0.6.0] — 2026-04-14

Release minor con dos features grandes sobre V0.5.1: sincronización canvas ↔ panel en la vista de edición, y un sistema completo de **Notas de producto** por nodo con toolbar markdown que se persiste como anotación nativa amarilla en Figma.

## Sincronización canvas ↔ panel en edit view

Antes, hacer click en una fila del panel solo cambiaba el activeNodeId local sin tocar el canvas — el usuario tenía que buscar el nodo manualmente. Ahora ambos modos (edit y specs view) usan el mismo flujo:

- **Click en una fila del editor** → selecciona el nodo en el canvas de Figma con \`figma.currentPage.selection\` y dispara scroll-and-zoom-into-view automático
- **Añadir un elemento via "Añadir elemento"** → además de pinearse en el árbol del editor, el nodo nuevo queda seleccionado en el canvas para confirmación visual inmediata
- La protección contra loops vía \`markProgrammaticSelection\` ya estaba en su sitio

## Nueva feature: Notas de producto por nodo

Cada nodo del árbol acepta ahora un campo de texto libre con formato markdown para definir especificaciones de producto. El contenido se persiste como anotación nativa de Figma y aparece en el handoff de Dev Mode.

### Editor (vista de edición)

- Nuevo botón con icono **AlertTriangle** (triángulo con exclamación) al lado del icono de Dev docs en la fila superior del TagRow
- Click → popover ancho (360px) con textarea grande autoexpandible (mínimo 140px), sin límite de caracteres
- **Toolbar de 9 botones markdown**, exactamente los que \`Annotation.labelMarkdown\` de Figma reconoce:
  - **B** Bold (\`**text**\`)
  - *I* Italic (\`*text*\`)
  - ~~S~~ Strikethrough (\`~~text~~\`)
  - \`<>\` Inline code (\`\` \`text\` \`\`)
  - ▣ Code block (\` \`\`\` \`)
  - 🔗 Link — wrappea la selección con \`[texto](Añade aquí tu enlace)\` y deja el placeholder seleccionado para tipear directo encima
  - **H₂** Heading 2 (\`## text\`) — Figma solo soporta H2
  - • Bullet list (\`- text\`)
  - 1. Numbered list (\`1. text\`)
- Cada botón wrappea/prefijea la selección con el marker correspondiente y restaura el caret + scroll del textarea tras el cambio
- Estado **pressed** del icono (chrome-bg sólido + inset shadow) cuando el nodo tiene notas asignadas
- Cancelar restaura el draft al valor persistido; Guardar dispara la persistencia

### Specs view (MetadataDetail)

- Bloque nuevo al final del MetadataDetail (después de Dev docs) con label "Notes" arriba
- El contenido se renderiza con **el mismo formato que la anotación nativa de Figma**, no en crudo:
  - **bold** → \`<strong>\`, *italic* → \`<em>\`, ~~strike~~ → \`<s>\`
  - \`inline code\` con fondo gris, code blocks como \`<pre><code>\` con padding
  - \`[text](url)\` como \`<a target="_blank" rel="noopener noreferrer">\` clickable
  - \`## H2\` como \`<h2>\`, listas como \`<ul>\`/\`<ol>\`
- Implementación con renderer custom propio (\`notesMarkdownRenderer.tsx\`, ~120 LOC) en vez de añadir \`react-markdown + remark-gfm\`. Garantiza isomorfismo Specs ↔ blueprint: nada que Figma no soporte se cuela accidentalmente

### Blueprint nativo (Generate blueprint)

- Generate blueprint ahora crea **tres** categorías nativas en Figma:
  - **Reading** (azul) — orden de lectura
  - **Focus** (rojo) — orden de foco
  - **Notes** (amarillo) — notas de producto, NUEVA en V0.6.0
- Cada nodo con \`notes\` produce una anotación adicional en la categoría Notes con el contenido **íntegro** del campo como \`labelMarkdown\` (sin recorte ni resumen)
- Sync idempotente: re-pulsar Generate blueprint produce el mismo estado final
- Remove blueprint también limpia anotaciones de Notes
- Retro-compat: frames con solo Reading+Focus pre-existentes siguen funcionando en lookup read-only (la categoría Notes es opcional en el lookup)

## Fixes

- **Scroll del textarea de notas se reseteaba a 0 al aplicar formato**: capturamos \`scrollTop\` antes de mutar el value y lo restauramos en RAF después de \`setSelectionRange\`, así la vista se queda donde el usuario pulsó el botón aunque estuviera al final de un texto largo
- **Botón link del toolbar usaba \`window.prompt\` que Figma bloquea silenciosamente** en su iframe sandboxed (sin \`allow-modals\`). Reemplazado por el patrón wrap-with-placeholder: el botón inserta \`[texto](Añade aquí tu enlace)\` y deja el placeholder seleccionado para que el usuario lo reemplace tipeando directo encima

## Notas técnicas

- 9 commits sobre V0.5.1 agrupados en este minor por la magnitud del feature de Notas (toolbar + popover + render + blueprint integration) y la sincronización bidireccional canvas↔panel
- Tests: 406 → 439 (+33). Cobertura nueva para el parser markdown (parseInline, parseBlocks), el render de cada uno de los 9 marcadores, sync canvas↔panel y la categoría Notes en el blueprint
- Renderer markdown propio en \`src/features/tagging/ui/notesMarkdownRenderer.tsx\`. Cero dependencias nuevas. Las características no soportadas por Figma (H1/H3+, blockquote, underline, tablas, GFM tables) están deliberadamente NO implementadas para mantener el isomorfismo con el handoff de Dev Mode.

## Aprendizaje destacado

\`window.prompt\`, \`window.alert\` y \`window.confirm\` están bloqueados silenciosamente en el iframe del UI de plugins de Figma (sandbox sin \`allow-modals\`). El callsite no lanza error: el modal simplemente no aparece. Cualquier input ligero del usuario debe usar componentes inline o el patrón wrap-with-placeholder.


## [V0.5.1] — 2026-04-14

Release patch centrada en fixes y refinamientos del feature **Dev docs** (enlace de documentación por nodo, introducido en V0.5.0) más mejoras menores de UX en el editor.

## Fixes críticos

### Persistencia de \`docUrl\` en el sandbox de Figma

\`docUrl\` se perdía silenciosamente al persistir a \`pluginData\` aunque otros campos (\`role\`, \`focus\`, \`reading\`, \`container\`) sí persistían correctamente. La causa: \`normalizeDocUrl\` usaba \`new URL(...)\` que **no está disponible en el sandbox de plugins de Figma** (es un runtime JS sin la mayoría de Web APIs). El catch retornaba \`undefined\` silenciosamente, lo que hacía que \`serializeTagData\` borrara \`docUrl\` en cada round-trip.

\`normalizeDocUrl\` ahora detecta \`typeof URL === 'undefined'\` y cae a un check de regex para valores ya pre-normalizados. Tests de regresión simulan el sandbox borrando \`globalThis.URL\` antes de cada test.

## Nueva feature: enlace de Dev docs interactivo en Specs

La fila de **Dev docs** del MetadataDetail (Specs view + info dropdown) pasa de ser un texto pasivo a un control interactivo completo:

### Estado pressed del icono

- Cuando el nodo tiene un \`docUrl\` asignado, el icono de link en el editor pasa al estado visual "pressed" (chrome-bg sólido + inset shadow), igualando el lenguaje del botón Info del TagRow.
- Antes el cambio era solo de color de texto y resultaba imperceptible.
- Añade \`aria-pressed\` para tecnología asistiva.

### Click para abrir el enlace en el navegador

- La fila **Dev docs** del MetadataDetail ahora es un button que dispara \`figma.openExternal()\` al hacer click, abriendo el enlace en el navegador externo del usuario.
- Underline punteado para señalar interactividad, hover background, focus ring para accesibilidad de teclado.

### Tooltip rápido con la URL completa

- El atributo \`title\` nativo del browser tarda ~700ms en aparecer y no se puede customizar. Reemplazado por un tooltip propio:
  - Aparece con **150ms** de delay en pointerEnter, desaparece inmediato en pointerLeave/click/blur.
  - Renderizado vía \`createPortal\` a \`document.body\` para escapar el \`overflow-hidden\` del SettingsCard contenedor.
  - Position fixed calculada del rect del button, recalculada en scroll/resize.
  - Width acotada a 320px máx con \`[overflow-wrap:anywhere]\` para que URLs largas hagan wrap legible.

### Botón "Copiar URL"

- Compartir el enlace de Dev docs es un caso de uso frecuente. Nuevo botón secundario al lado del valor que copia la URL al portapapeles con un click.
- Usa \`navigator.clipboard.writeText\` cuando está disponible, con fallback a textarea oculto + \`document.execCommand('copy')\` por si el iframe del plugin no expone Clipboard API o la rechaza por permisos.
- Feedback visual: el icono de Copy pasa a Check durante 1.5s tras un copy exitoso, con \`aria-label\` cambiando entre "Copy URL" / "Copied!" para tecnología asistiva.

### Orden y nomenclatura

- **Dev docs** se mueve al final del orden fijo del MetadataDetail (después de pattern), por ser metadata auxiliar de developer handoff y no parte del modelo accesible core (role/reading/focus/etc).
- Renombrado de "Developer docs" → **"Dev docs"** en los 5 idiomas (en, es-ES, ca, gl, eu) para unificar editor y structural view bajo el mismo label corto.

## Mejoras de UX en el editor

### Filas de SECTION deshabilitadas

Las secciones de Figma son organizadores visuales sin metadata accesible. Hasta ahora la fila era completamente editable, lo que confundía al usuario. Ahora:

- **Banner restaurado** arriba del TagList cuando el activeNode es un SECTION, con el texto _"Las secciones solo organizan visualmente. Selecciona un nodo hijo para taguearlo."_ en los 5 idiomas. Este banner existía antes de V0.5.0 pero se había eliminado al refactorizar el wizard, dejando solo la traducción huérfana.
- **Todos los controles editables del row** (R/F pills, icono Dev docs, dropdown Rol, dropdown Estado, textarea Accessible name, pin/move buttons) pasan a estado deshabilitado: opacidad reducida, \`pointer-events-none\`, \`aria-disabled\`. El click en el nombre del row sigue funcionando para seleccionar el section en el canvas; solo se bloquea la edición.
- El botón Info (expand metadata) sigue habilitado.

### Otros refinamientos

- **"Heading" → "Level"** en el row label del MetadataDetail. El valor son niveles (H1..H6, p), no el concepto de heading en sí. "Level" es más preciso. Aplicado a en, es-ES, ca, gl, eu.

## Notas técnicas

- 12 commits sobre V0.5.0, agrupados en este patch porque son todos refinamientos del feature Dev docs + mejoras menores que no merecen un minor bump.
- Suite de tests crece de 391 a 406 (15 nuevos): cobertura de regresión para sandbox URL fallback, render del icono pressed, click externo, tooltip rápido, copy button, orden de filas, deshabilitado de SECTION rows, y persistencia end-to-end.
- Test crítico: \`docLinks.test.ts\` simula el sandbox de Figma borrando \`globalThis.URL\` con \`delete\` antes de cada caso. Esto previene que un futuro refactor que dependa de Web APIs en código compartido entre UI y sandbox vuelva a romper persistencia silenciosamente.


## [V0.5.0] — 2026-04-13

Release minor centrada en el blueprint nativo de Figma, un nuevo enlace de documentación por nodo y la eliminación completa del sistema overlay legacy.

## Cambios principales

### Enlace de documentación por nodo (nueva feature)

Cada nodo del árbol ahora puede tener un enlace a su documentación de desarrollo, editable desde Tagging y abrible desde Specs.

- Nuevo icono de link en la fila superior del editor de Tagging. Al pulsarlo aparece un popover de edición.
- El popover se renderiza vía \`createPortal\` sobre \`document.body\` con posición fija, por lo que queda siempre por encima del árbol y del resto del panel, incluso cuando la fila está dentro de contenedores con overflow o \`transform\`.
- Recálculo automático de la posición en \`scroll\` y \`resize\`, con flip hacia arriba si no hay espacio por debajo.
- El campo acepta tres formatos que se normalizan antes de persistir: URLs HTTP/HTTPS completas, rutas \`figma.com/...\` sin protocolo y file IDs sueltos de Figma.
- En Specs el icono se muestra como botón read-only; al pulsarlo se abre el enlace vía \`figma.openExternal()\` desde el sandbox del plugin.
- Un nodo con solo \`docUrl\` como metadata authored ya cuenta como documentable y aparece en Specs.

### Blueprint nativo de Figma con dos categorías (Reading y Focus)

- Al pulsar **Generate blueprint** el plugin crea dos categorías nativas de anotación en Figma: **Reading order** (azul) y **Focus order** (rojo). Un nodo con ambos órdenes produce dos entries independientes, una en cada categoría.
- La proyección del blueprint ahora recorre el mismo árbol documentable que Structural View (\`buildDocumentableNodes\`), por lo que Generate blueprint y Structural View siempre hablan del mismo conjunto de nodos y respetan los órdenes faltantes calculados.
- Corregido el error runtime \`Only one of label or labelMarkdown should be given\` que aparecía al regenerar el blueprint cuando Figma devolvía anotaciones con ambos campos a la vez. Todas las annotations se sanitizan al subconjunto válido de la write API antes de reasignarse.
- \`hasAuthoredTagData\` ahora trata \`focusOrder\` como dato authored, de modo que Generate blueprint queda habilitado aunque el toggle \`focus\` no viaje explícitamente (handoffs legacy).

### Eliminación del sistema overlay legacy

Se retira por completo el antiguo sistema de overlay sobre el canvas. El blueprint nativo de Figma lo reemplaza como superficie de handoff.

- Eliminados \`overlayRenderer.ts\` y \`overlayProjection.ts\` y sus dependencias transitivas en \`documentationHandler\`, \`frameScanner\`, \`taggingHandler\`, \`frameDiscovery\` y \`useFrameSession\`.
- Limpieza de claves i18n, mensajes del puente UI↔sandbox y utilidades de tagging ya no referenciadas.

## Refactor interno

### Catálogo único de roles (\`roleDefinitions.ts\`)

- Nuevo \`src/shared/a11y/roleDefinitions.ts\` como fuente única de verdad de los 22 roles semánticos, sus capacidades y sus defaults.
- Los tipos \`Role\`, \`NodeState\`, \`Container\`, \`HeadingLevel\` y \`TextAltType\` ahora se derivan del catálogo en vez de mantenerse duplicados en \`tagTypes.ts\`, lo que elimina ~189 líneas redundantes y garantiza que cualquier cambio en el catálogo se propague automáticamente a los tipos.

## Fixes misceláneos

- **Persistencia de \`state\` en Tagging**: el dropdown de Status ya no rebota la selección. \`normalizeTagData\` preservaba todos los campos menos \`state\`, por lo que el valor nunca llegaba a persistirse en \`pluginData\`.

## Notas técnicas

- Los nuevos mensajes del puente añaden \`A11Y_OPEN_DOC_URL\` al contrato \`UiToSandboxMessage\`.
- El contrato persistido \`NodeTagData\` gana un campo opcional \`docUrl: string | null\` con herencia y round-trip desde \`sourceOrigin\`. Documentado en \`docs/architecture/pluginData.md\`.

## [V0.1.6] — 2026-04-07

### ✨ Cambios destacados

- **Blueprint nativo en Dev Mode**: nuevo módulo \`blueprintRenderer.ts\` que genera anotaciones nativas de Figma (\`annotations.create\`) para cada nodo taggeado, permitiendo que el equipo de desarrollo vea la especificación a11y directamente en Dev Mode. Incluye renderizado markdown con roles, focus/reading order, textos alternativos y propiedades semánticas. El botón Generate sincroniza anotaciones con el draft local y \`Remove\` solo borra la categoría Accessibility, preservando otras anotaciones del equipo.
- **Blueprint sincronizado con draft local**: \`DocumentationPanel\` ahora usa \`previewSession\` cuando existen drafts locales, de modo que Generate blueprint refleja el estado actual del Structural View sin esperar a \`Add tags\`. El footer compara una firma local del blueprint esperado con las anotaciones reales en canvas para controlar el estado del CTA.
- **Agrupación por subárbol visible**: cada anotación del blueprint representa un subárbol top-level del Structural View (no solo nodos con \`container\`), por lo que un \`Menu Item\` con su \`FigSet\` anidado salen juntos en la misma card. El \`wrapper\` del frame raíz es transparente para Blueprint.
- **Click en nombre selecciona nodo en canvas**: en el inspector de metadata de Settings, hacer click en el nombre de un nodo ejecuta \`figma.currentPage.selection = [node]\`, facilitando la navegación entre el inspector y el canvas.
- **Scrollbar custom overlay**: la scrollbar nativa está completamente oculta (\`scrollbar-width: none\`) porque el webview de Figma no respeta ningún estilo de forma consistente. Un thumb custom \`<div>\` absoluto en \`App.tsx\` se posiciona via JS en \`handleScroll\` y desaparece tras \`SCROLL_IDLE_DELAY_MS\`. Los paddings del wrapper interno son ahora simétricos con \`--chrome-side-padding\`.

### 🐛 Correcciones

- **Reading/focus order recalculado por tree-order**: \`buildDocumentableNodes()\` ahora primero monta el árbol con \`sortIntoTreeOrder\` (que respeta \`childOrder\`) y después asigna órdenes por posición, eliminando el desfase con badges de Tagging.
- **CTA Generate deshabilitado cuando canvas y plugin coinciden**: el botón solo se activa si la firma del blueprint esperado difiere de las anotaciones presentes en canvas.
- **Heading text y alt type explícitos en preview**: el blueprint compacta título/lista, separa \`Alt type\` de \`Alt text\`, y el heading muestra \`readingText\` en vez del nivel \`H2\`.
- **Reading text fallback suprimido cuando textAlt existe**: el fallback textual ya no se muestra en Documentation cuando el nodo tiene \`textAlt\` propio.
- **Botón container visible en nodos que ya lo tienen**: los nodos con container asignado muestran el botón de edición en Tagging.
- **Inspector de metadata refinado**: jerarquía anidada con depth basado en ancestros, separadores entre siblings, hover accesible, botón colapsar, iconos mejorados y botón de ocultar sección. Profundidad compactada para ahorrar espacio vertical.

Un plugin de Figma que permite anotar, validar y documentar
la accesibilidad de una pantalla **sin salir del editor**.
Funciona en modo diseño y en Dev Mode: el mismo plugin,
dos experiencias adaptadas a cada rol.

---

## Qué es

A11Y Copilot es un plugin de Figma pensado para cerrar el hueco entre
diseño y desarrollo cuando se trata de accesibilidad. La accesibilidad
se pierde en el handoff: diseño toma decisiones sobre roles, orden de
lectura, textos alternativos y jerarquía de encabezados, pero esa
información viaja entre equipos sin un canal estructurado: queda
repartida entre documentos paralelos, comentarios de Figma y
conversaciones puntuales, formatos que dificultan que llegue completa
al momento de implementar.

El resultado: trabajo de accesibilidad que se duplica o se queda
incompleto en el camino entre diseño y desarrollo, no por falta de
intención de ningún equipo, sino por la falta de un puente común entre
ambas disciplinas.

Este plugin es ese puente. Taggeas cada nodo relevante con su rol
semántico, defines el orden de lectura y foco, añades labels y notas de
producto, y el equipo de desarrollo lo ve todo directamente en Dev Mode,
sin tener que salir de Figma. Mismo archivo, mismo flujo, sin
documentos paralelos.

## Para quién es

| Rol                        | Qué hace con el plugin                                                                                                                                              |
| -------------------------- | ------------------------------------------------------------------------------------------------------------------------------------------------------------------- |
| **Diseño / Accesibilidad** | Anota cada pantalla con roles semánticos, orden de lectura/foco, etiquetas y textos alternativos. Valida problemas en tiempo real.                                  |
| **Desarrollo**             | Abre el plugin en Dev Mode, inspecciona cualquier nodo y ve directamente los metadatos de accesibilidad que le corresponden, tal como los dejó el equipo de diseño. |

¿Es para ti si eres un diseñador que **nunca ha pensado en
accesibilidad**? Sí. El plugin está diseñado para que puedas empezar
sin conocimientos previos de ARIA, WCAG ni de cómo funciona un lector
de pantalla. Va a proponerte valores por defecto razonables para cada
rol que asignes y te va a avisar cuando falte algo importante (un
label, un texto alternativo, un orden duplicado). No sustituye a una
auditoría formal de accesibilidad, pero sí te da un punto de partida
estructurado sobre el que iterar.

Conocimiento recomendado (no obligatorio): tener claro qué es un
botón, un heading, un campo de formulario y una imagen. A partir de
ahí el plugin te guía.

## Primeros pasos

Un recorrido de 60 segundos desde cero hasta taggear tu primer nodo.

**1. Instala el plugin.** Todavía no está en la Figma Community, así que
hay que clonar el repositorio y ejecutarlo localmente. Los pasos
detallados están en la sección [Cómo ponerlo a funcionar en tu
Figma](#-cómo-ponerlo-a-funcionar-en-tu-figma) al final del documento.

**2. Impórtalo en Figma.** Una vez que tengas \`npm run dev\` corriendo,
en Figma Desktop ve a \`Plugins → Development → Import plugin from
manifest…\` y selecciona \`dist-dev/manifest.json\`.

**3. Ábrelo en un archivo.** En cualquier archivo de Figma:
\`Plugins → Development → A11Y Copilot\`. El plugin se abre como panel
lateral.

**4. Selecciona un frame.** Hasta que no selecciones nada, el panel te
muestra una pantalla vacía con instrucciones breves. Selecciona un
frame, componente, instancia o sección en el canvas y el plugin
escaneará toda su estructura.

**5. Taggea tu primer nodo.** El plugin lista jerárquicamente todos los
nodos que ha encontrado dentro de tu selección. Haz click en el
selector de rol (el badge de la derecha de la fila) y elige, por
ejemplo, \`Button\`. El plugin propone automáticamente focus + reading
activos y captura el texto visible como label. Ya tienes tu primer
nodo anotado.

**6. Confirma con Marcar.** Todo lo que has editado está en un
borrador local (preview en vivo). Pulsa **Marcar** en el footer para
persistirlo en Figma. A partir de ahí viaja con el nodo.

**7. Ve las specs.** Pulsa el icono de lock en la cabecera para
alternar a la **Vista de specs**, donde verás el resumen estructural.
Desde ahí puedes generar el blueprint nativo que aparecerá en Dev
Mode como annotations.

Eso es todo. El resto de este documento profundiza en cada pieza.

- **Resumen del frame**: contador de nodos totales, cuántos están

- **Lista de nodos**: cada fila es un nodo del árbol. La jerarquía se

- **Flow pills \`R\` / \`F\`**: a la izquierda de cada fila, dos badges

- **Icono de tipo de nodo + nombre**: identifica de qué nodo de Figma
  se trata (frame, component, instance, text, section, group…). El
  nombre es el que tiene el nodo en Figma.
- **Cluster derecho**: pictos pequeños que resumen el estado de
  metadata de ese nodo:

  - **Icono de notes** — aparece si hay notas de producto.
  - **Menú kebab \`⋯\`** — abre las opciones extra (dev docs, notas,
    atributos personalizados). Si hay opciones activas, un **badge
    numérico** a la izquierda del kebab resume cuántas.
  - **Badge de rol** (píldora) — dropdown inline para asignar el rol
    semántico (Button, Heading, Image, etc.).
  - **Arrow up / down** — flechas de reordenación manual (solo cuando
    procede).
- **Bottom row**: segunda línea dentro de la misma fila, con el campo
  semántico (label, heading level, text alternative) a la izquierda y
  el selector de **State** (dropdown) a la derecha.
- **Botón de info (ℹ)**: a la derecha del todo, abre el panel de
  metadata expandida del nodo.
- **Add element**: botón para pinar en la lista un nodo que estaría
  fuera del preview normal (por ejemplo, un descendiente textual que
  el plugin no promueve por defecto).
- **Footer**: a la derecha, el botón principal cambia según la vista:
  - Vista de edición → **Marcar** (persiste el borrador) y **Limpiar**
    (borra metadata del nodo seleccionado).
  - Vista de specs → **Generar specs** (crea/actualiza el blueprint
    nativo en Dev Mode).

En Dev Mode este panel es más simple: lock bloqueado en specs, sin
footer de edición, solo consulta.

## Modo diseño — Vista de edición

Aquí vive el grueso del trabajo. Cuando seleccionas un frame, el plugin
escanea su árbol entero y construye la lista que vas a editar.

### Seleccionar un frame

El plugin no hace nada hasta que selecciones algo en el canvas. Puedes
seleccionar:

- Un **frame** de pantalla completa.
- Un **componente** o **instancia** individual.
- Una **section** (solo como organizador visual — no aporta semántica,
  pero sus hijos sí se escanean).

Al seleccionar, el plugin escanea toda la descendencia visible y monta
la lista. Si la selección cambia, re-escanea. Si haces click sobre una
fila del preview, el plugin **selecciona ese nodo en el canvas y hace
scroll hasta él**, para que no pierdas el contexto visual de qué
estás taggeando.

En la selección vacía el plugin muestra una pantalla de bienvenida con
los pasos básicos y un par de tips. Es el sitio al que vuelves si
deseleccionas todo.

### Roles semánticos

El selector de rol (la píldora del cluster derecho de cada fila) es la
pieza central. Asignar un rol tiene tres efectos:

1. **Propuesta automática de defaults.** Cada rol tiene sus propios
   valores por defecto para focus y reading. Por ejemplo, al asignar
   \`Button\` el plugin activa automáticamente focus + reading. Al
   asignar \`Image\`, activa textAlt pero deja reading/focus en \`false\`
   hasta que tú decidas. No es un bloqueo: es una propuesta razonable
   que puedes cambiar después.

2. **Captura de label.** Para roles con estrategia \`capture-text\`
   (Button, Heading, Link, Text, Checkbox, Toggle button, Switch, List
   item, Tab bar, Accordion, Dropdown, Grouped text), el plugin
   intenta capturar el texto visible del nodo como label inicial.
   Para roles con estrategia \`editable\` (Image, Text field, Password
   field, Search field, Number field, Date field, Text area, Slider),
   el label queda vacío y editable. Para \`fixed\` (Stepper, Carousel),
   se asume que el patrón define el label de otra forma.

3. **Selector de estado contextual.** Según el rol, el dropdown de
   State muestra solo los valores que tienen sentido. Un Button puede
   estar \`Enabled / Disabled / Error / Read only\`; un Checkbox puede
   estar \`Selected / Not selected / Disabled / Error\`; un Heading o un
   Text no expone selector de estado porque no aplica.

El plugin incluye **22 roles**. La tabla completa con su uso
recomendado está en [Referencia de roles semánticos](#referencia-de-roles-semánticos).

### Reading order y focus order

Cada nodo tagueado puede pertenecer a dos flujos:

- **Reading order (\`R\`)**: el orden en el que un lector de pantalla
  recorre la pantalla. Lo componen los nodos con contenido textual o
  con label accesible (headings, textos, botones, links, inputs,
  imágenes con texto alternativo, etc.).
- **Focus order (\`F\`)**: el orden en el que el foco de teclado salta
  entre elementos. Lo componen los nodos interactivos.

Los pills \`R\` y \`F\` a la izquierda de cada fila son **toggles
directos**. Click sobre \`R\` incluye o excluye el nodo del reading
flow; click sobre \`F\` hace lo mismo con el focus flow. El número
dentro del pill indica la posición del nodo en ese flujo.

**El orden se asigna automáticamente** según el orden de la lista
(que por defecto replica el orden de árbol de Figma). No tienes que
escribir números a mano. Si quieres cambiar el orden de un nodo, usa
las flechas **arriba/abajo** del cluster derecho: el plugin
recalcula todos los números afectados en cascada.

> Dato importante: reading es el **master switch** de los slots
> semánticos. Si apagas \`R\` en un nodo que tenía heading, label o
> textAlt, el plugin apaga también esos campos en cascada. No pueden
> existir sin reading activo.

### Labels y textos alternativos

El campo inline debajo del nombre del nodo es donde vive el **texto
accesible** del nodo. Qué muestra depende del rol:

- **Roles interactivos y textuales con \`reading\` activo** → campo de
  **label** (accessible name). Para un botón es "Enviar formulario";
  para un link es "Volver al inicio"; para un heading es el texto del
  título.
- **Rol \`Image\`** → dropdown de **Alternative type** con dos opciones:
  - **Info** — descripción informativa del contenido visual
    (logotipos con significado, ilustraciones que aportan información).
  - **Func** — descripción funcional (una imagen que actúa como botón
    describe lo que hace, no lo que es).
  - Al elegir tipo, aparece el campo de texto alternativo para
    rellenar.
- **Rol \`Heading\`** → además del label, un selector de nivel: \`h1\`,
  \`h2\`, \`h3\`, \`h4\`, \`h5\`, \`h6\`, \`p\`. El nivel define cómo se anuncia
  la jerarquía al lector de pantalla.

Para capturar texto desde descendientes del nodo sin tener que
reescribirlo, el plugin expone un **picker de texto interno** (atajo
\`Pick inner text\`): lista todos los nodos \`TEXT\` dentro del nodo
tagueado y puedes elegir cuál sirve de label. Útil cuando un botón
tiene varios texts anidados y quieres elegir explícitamente cuál es el
accessible name.

### Contenedores

Los frames que agrupan elementos pueden marcarse como
**contenedores** para aportar estructura semántica. Hay tres tipos:

- **Wrapper** — agrupación genérica, sin significado semántico fuerte.
- **List** — el frame representa una lista; sus hijos son list items.
- **Screen** — el frame es una pantalla completa (landmark \`main\`).

Un contenedor no expone toggles de reading/focus ni bottom row con
label/state: es estructura pura. El rol de un contenedor se asigna
desde el mismo dropdown (opción \`Mark as container\` / \`Remove
container\`), no desde la lista de roles semánticos.

### Menú de opciones extra (⋯)

El kebab del cluster derecho abre tres opciones que no viven en la
fila principal porque no son de uso frecuente. Un **badge numérico**
junto al kebab te indica de un vistazo cuántas están activas en este
nodo.

#### Dev docs

Un enlace a la documentación técnica del componente o patrón. Acepta
tres formatos:

- URL externa (cualquier \`http(s)://...\`).
- Ruta de Figma (\`figma.com/...\`, con o sin dominio).
- File ID de Figma (el hash que aparece en la URL de un archivo).

El plugin valida el formato al guardar: si no encaja en ninguno de
los tres, muestra el mensaje "Enter a valid URL, figma.com path or
Figma file ID" y no guarda. Cuando el link es válido, aparece un icono
de link en el cluster derecho del nodo que abre el enlace con
\`figma.openExternal()\`. En la Vista de specs también se renderiza
copiable.

#### Notas de producto

Campo multilínea con **toolbar markdown completo**. Los botones
disponibles:

- **Bold / Italic / Strikethrough** — formato básico de texto.
- **Inline code / Code block** — para snippets técnicos.
- **Link** — inserta un enlace con placeholder editable.
- **Heading** — insertar encabezado dentro de la nota.
- **Bullet list / Numbered list** — listas con viñetas o numeradas.

Las notas viajan con el nodo y se renderizan:

- En el propio diálogo mientras las editas (preview en vivo del
  markdown).
- En la Vista de specs como bloque expandible.
- En el **blueprint nativo** en Dev Mode, bajo la categoría \`Notes\`.

Piensa en las notas como un espacio para todo lo que no encaja en los
campos estructurados: comportamiento esperado, casos edge,
referencias cruzadas a otras pantallas, aclaraciones de producto
específicas de ese componente en ese contexto.

#### Atributos personalizados

Pares **clave + valor** de texto libre para cualquier metadato que no
encaje en los campos estándar. Ejemplos reales:

- \`aria-describedby\` → \`"error-hint-1"\` (referencias ARIA explícitas)
- \`estado-visual\` → \`"loading"\` (estados que no están en la matriz
  estándar)
- \`analytics-id\` → \`"cta-submit"\` (metadata para tracking)

Límites validados al guardar:

- Clave: máximo 40 caracteres.
- Valor: máximo 500 caracteres.
- Entradas con clave o valor vacíos no se persisten.

Cuando el nodo hereda atributos de su componente origen, el diálogo
muestra esos valores como parent values. Si los sobrescribes
localmente, aparece un botón **Restaurar** que vuelve a los valores
heredados de un click, sin perder el resto del contexto. Este botón
es el patrón general del plugin: **el override es local, el baseline
persiste**.

#### Badge numérico

El pequeño badge gris a la izquierda del kebab cuenta cuántas de las
tres opciones (dev docs, notes, custom attributes) están activas en
ese nodo. Sirve para identificar de un vistazo qué filas tienen
metadata extra sin tener que abrir una por una.

### Reordenar y pin

Dos mecanismos para organizar la lista:

**Flechas arriba/abajo.** Aparecen en el cluster derecho cuando
procede y mueven el nodo una posición en la lista. La reordenación se
propaga a los números de reading y focus order automáticamente: no
tocas números, mueves filas.

**Pin.** El botón **+ Add element** al final de la lista abre un
selector que te permite pinar en el preview nodos que normalmente no
aparecen (por ejemplo, un descendiente textual que el plugin no
promueve a fila propia por defecto). Los nodos pinados se identifican
con una \`X\` pequeña a su derecha para desanclar y dejan de aparecer
si quitas el tag. Úsalo cuando un elemento necesita tag pero no está
en la lista por defecto.

### Borrador local y Marcar

Toda la edición vive en un **borrador local** que se refleja en la
vista previa en tiempo real. Los cambios **no se persisten en Figma
hasta que pulsas Marcar**. Eso te permite:

- Iterar rápido sin escribir en pluginData en cada pulsación.
- Ver el efecto inmediato de cambiar un rol o mover un orden.
- Descartar todo cerrando el plugin si has hecho un lío (aunque
  perderás el trabajo no persistido, así que marca frecuentemente).

El botón **Marcar** persiste el borrador en \`pluginData\` bajo la clave
\`a11y\` de cada nodo. El botón **Limpiar** elimina los tags del nodo
seleccionado (o de los nodos seleccionados si hay varios), preservando
la baseline heredada del componente origen para que el icono de
refresh pueda restaurarla.

## Modo diseño — Vista de specs

Pulsa el icono de **lock** en la cabecera y el panel cambia a la
Vista de specs. Es la misma información, pero en modo consulta: solo
muestra los nodos que tienen metadata de accesibilidad, sin editores
inline.

### Resumen estructural

La lista se filtra a los nodos tagueados y se presenta como **árbol
jerárquico**. Cada fila muestra:

- Nombre del nodo e icono de tipo.
- Rol asignado (píldora de solo lectura).
- Orden de reading y focus (pills informativas).
- Campo semántico con su valor (label, heading level, textAlt).
- State si lo hay.
- Botón de **info** a la derecha que despliega la metadata expandida:
  rol, estado, container, reading order, focus order, label / heading
  level / text alt, dev docs (con botones de abrir y copiar) y notas
  de producto renderizadas en markdown.

Es la vista que un dev puede abrir para ver el handoff completo antes
de empezar a implementar.

### Blueprint nativo

El botón **Generar specs** del footer crea un conjunto de
**annotations nativas de Figma** sobre el frame activo. Estas
annotations quedan **dentro del archivo de Figma** y viven en el
panel de **Inspect de Dev Mode**, agrupadas en tres categorías:

- **Reading order** (color Figma azul): una annotation por nodo del
  flujo de lectura, con el número de orden.
- **Focus order** (color Figma rojo): una annotation por nodo del
  flujo de foco.
- **Notes** (color Figma amarillo): una annotation por cada nodo que
  tiene notas de producto, con el markdown renderizado.

El blueprint se sincroniza con el borrador activo: si editas en la
Vista de edición y cambias a Vista de specs sin haber pulsado
Marcar, **Generar specs** refleja los cambios del borrador. El botón
indica si el blueprint actual está sincronizado con el estado del
handoff, y si no lo está, genera la diferencia.

## Dev Mode

Cuando un desarrollador abre el plugin en Dev Mode, la interfaz se
reduce a lo esencial: **Vista de specs** y **Settings**. No hay
edición ni footer de acciones. El contexto es de consulta pura.

Lo que ve exactamente el dev:

- La misma lista jerárquica de nodos tagueados, con su metadata
  completa: rol, orden, label, alt text, state, dev docs y notas de
  producto.
- El **Metadata inspector**: al seleccionar un nodo, un panel dedicado
  muestra todos los campos estructurados de ese nodo con un diseño
  orientado a copiar/pegar. Incluye colapsado de bloques de código
  (útil si las notas tienen snippets largos).
- Los campos de dev docs se exponen con dos acciones: **Open dev
  docs** (abre el enlace con \`figma.openExternal()\`) y **Copy URL**
  (copia el enlace al portapapeles con feedback visual).

Si el equipo de diseño generó un blueprint, las anotaciones aparecen
además como **tarjetas nativas de Figma** en las categorías **Reading
order**, **Focus order** y **Notes**, directamente en el panel de
Inspect — sin necesidad de abrir el plugin.

\`\`\`
  Dev Mode → Inspect → Annotations
  ┌─────────────────────────────┐
  │ 🏷  Accessibility           │
  │                             │
  │  Role: Button               │
  │  Label: "Enviar formulario" │
  │  Focus order: 3             │
  │  Reading order: 5           │
  └─────────────────────────────┘
\`\`\`

En práctica: un dev puede hacer todo el handoff consultando solo el
panel de Inspect nativo. El plugin abierto es útil cuando se quiere
explorar la pantalla entera o navegar entre nodos sin perder la vista
de conjunto.

## Herencia y reutilización

Uno de los conceptos clave del plugin. La metadata de accesibilidad no
se "copia y pega": se **hereda** siguiendo las reglas de componentes
de Figma, y esa herencia es resiliente a cambios.

### Component → instance

Cuando una instancia vive en el canvas, el plugin resuelve su
metadata en cadena: \`instance → mainComponent → (si variante) variant
de origen\`. Si el componente origen ya tiene tags, la instancia los
hereda automáticamente. No tienes que taggear cada instancia a mano:
taggea el componente una vez y propaga.

Los campos que se heredan desde el \`sourceOrigin\` son:

- Rol, estado y container.
- Reading, focus y sus órdenes.
- Label, heading level, textAlt y su tipo.
- Dev docs y notas de producto.
- Atributos personalizados.

### Override vs inherited

Cualquier campo heredado puede sobrescribirse localmente en la
instancia. El plugin distingue visualmente cuando un valor viene del
parent (inherited) de cuando es local (override). El valor local
siempre gana — eso es lo que te permite, por ejemplo, cambiar el
label de un botón reutilizado en un contexto distinto sin romper el
componente original.

Cuando hay override local, aparece el botón **Restaurar** (en el
diálogo de atributos personalizados; un icono equivalente en otros
campos) que vuelve al valor heredado sin perder el resto del
contexto.

### Cambio de variante

Si una instancia cambia de variante en Figma, el plugin vuelve a
resolver su \`mainComponent\` en el siguiente escaneo y muestra la
metadata de la **variante actual**, no la anterior. Esto es
importante para componentes con variantes que cambian rol o estado
(un botón que alterna entre primary y disabled, un checkbox que
alterna entre selected y not-selected): cada variante puede tener su
propia metadata y el plugin te muestra la que corresponde.

### Frames copiados o duplicados

Cuando copias o duplicas un frame con tags, el plugin detecta que la
copia **ya no es el frame original**. En el siguiente escaneo
convierte la metadata heredada o relacionada en una **nueva base
local** dentro de la copia. La pantalla duplicada conserva sus tags
actuales, pero puede evolucionar independientemente sin pisar la
original. Útil cuando diseñas variantes de una pantalla (loading,
error, empty state) a partir de un frame base.

### Clear tags — opt-out explícito

El botón **Limpiar** del footer no borra sourceOrigin: lo que hace es
escribir **sentinels de opt-out** (\`null\`) por cada campo heredado.
El resultado visible es que el nodo queda sin tags, pero la baseline
del componente origen sigue ahí detrás. Un click en el icono de
**refresh** en la UI vuelve a heredar todo en bloque: es un reset
limpio sin perder el componente origen de referencia.

Si el nodo **no tiene sourceOrigin** (es un nodo autónomo, no viene
de ningún componente), Clear borra todo literalmente.

## Validaciones en tiempo real

El plugin valida cada frame al escanear y muestra los issues
encontrados en el header del preview. Los issues se recalculan cada
vez que cambias algo en el borrador: no hay que pulsar "validar",
pasa en vivo.

Qué se valida hoy:

| Issue                     | Cuándo se dispara                                                                                             | Mensaje                                                           |
| ------------------------- | ------------------------------------------------------------------------------------------------------------- | ----------------------------------------------------------------- |
| **Missing text alt**      | Un nodo con rol que requiere \`textAlt\` (hoy solo \`Image\`) no tiene texto alternativo rellenado.               | \`Role "{role}" should provide text alternative content.\`          |
| **Duplicate reading order** | Dos o más nodos comparten el mismo número en el flujo de lectura.                                             | \`Reading order {order} is duplicated.\`                            |
| **Duplicate focus order** | Dos o más nodos comparten el mismo número en el flujo de foco.                                                | \`Focus order {order} is duplicated.\`                              |

Los duplicados normalmente no deberían aparecer porque el plugin
asigna los números automáticamente, pero pueden ocurrir al combinar
frames heredados con overrides locales, o al importar data antigua.
La solución es usar las flechas de reordenación: mover un nodo una
posición recalcula la cascada entera.

No se valida (todavía): contraste de color, tamaño de target
interactivo, tamaño de texto, ni WCAG como estándar formal. Para eso
sigue siendo necesaria una auditoría manual o plugins específicos.

## Referencia de roles semánticos

Los 22 roles del plugin, agrupados por familia. Las capacidades
(focus / reading / heading / textAlt) y defaults se aplican
automáticamente al asignar el rol. Los ejemplos de mapping ARIA son
orientativos (la definición final depende del patrón de
implementación del dev).

### Texto y estructura

| Rol              | Label            | Uso recomendado                                                                               | Capacidades               |
| ---------------- | ---------------- | --------------------------------------------------------------------------------------------- | ------------------------- |
| \`heading\`        | Heading          | Títulos de sección. El nivel (\`h1\`–\`h6\` o \`p\`) se elige en el campo semántico.                | reading, heading          |
| \`text\`           | Text             | Párrafos, textos descriptivos, cualquier contenido textual plano que debe anunciarse.         | reading                   |
| \`groupedText\`    | Grouped text     | Conjunto de textos que se anuncian como una unidad (ej. nombre + email en una card).          | reading                   |
| \`listItem\`       | List item        | Un elemento dentro de una lista (el contenedor debe marcarse como \`List\`).                    | reading                   |
| \`image\`          | Image            | Imágenes que requieren texto alternativo. Elige entre \`info\` (informativa) y \`func\` (funcional). | reading, textAlt          |

### Interactivos básicos

| Rol              | Label            | Uso recomendado                                                                               | Capacidades               |
| ---------------- | ---------------- | --------------------------------------------------------------------------------------------- | ------------------------- |
| \`button\`         | Button           | Botón estándar que dispara una acción (submit, abrir modal, cerrar, etc.).                    | focus, reading            |
| \`toggleButton\`   | Toggle button    | Botón con dos estados que se mantiene pulsado/no pulsado (mute, pin).                         | focus, reading            |
| \`link\`           | Link             | Enlace a otra pantalla, URL externa o anchor dentro de la misma pantalla.                     | focus, reading            |
| \`checkbox\`       | Checkbox         | Casilla de selección múltiple (lista de opciones, aceptar términos).                          | focus, reading            |
| \`switch\`         | Switch           | Toggle binario (on/off) para configuraciones.                                                 | focus, reading            |

### Formularios

| Rol              | Label            | Uso recomendado                                                                               | Capacidades               |
| ---------------- | ---------------- | --------------------------------------------------------------------------------------------- | ------------------------- |
| \`textField\`      | Text field       | Input de texto de una línea.                                                                  | focus, reading            |
| \`passwordField\`  | Password field   | Input de contraseña (texto enmascarado).                                                      | focus, reading            |
| \`searchField\`    | Search field     | Input de búsqueda (con semántica específica de search).                                       | focus, reading            |
| \`numberField\`    | Number field     | Input numérico con validación/controles específicos.                                          | focus, reading            |
| \`dateField\`      | Date field       | Input de fecha (calendar picker o similar).                                                   | focus, reading            |
| \`textArea\`       | Text area        | Input de texto multilínea.                                                                    | focus, reading            |
| \`slider\`         | Slider           | Control de rango (volumen, zoom, filtro de precio).                                           | focus, reading            |

### Compuestos

| Rol              | Label            | Uso recomendado                                                                               | Capacidades               |
| ---------------- | ---------------- | --------------------------------------------------------------------------------------------- | ------------------------- |
| \`tabBar\`         | Tab bar          | Barra de pestañas que alterna entre varios paneles de contenido.                              | focus, reading            |
| \`stepper\`        | Stepper          | Control de incremento/decremento (cantidad en carrito, número de pasajeros).                  | focus, reading            |
| \`accordion\`      | Accordion        | Panel expandible/colapsable con título y contenido oculto.                                    | focus, reading            |
| \`dropdown\`       | Dropdown         | Selector que abre un popover con opciones (select, menú contextual, combobox).                | focus, reading            |
| \`carousel\`       | Carousel         | Carrusel de contenido navegable (banners, galería de imágenes).                               | focus, reading            |

### Estados permitidos por familia

Cada rol expone solo los estados que tienen sentido. La tabla resume
los bloques:

- **Roles sin estado** (\`heading\`, \`text\`, \`groupedText\`, \`listItem\`,
  \`image\`) — no exponen selector de State.
- **Actionable** (\`button\`, \`link\`, \`carousel\`, \`slider\`) —
  \`Enabled / Disabled / Error\` (\`button\` añade \`Read only\`).
- **Selectable** (\`toggleButton\`, \`checkbox\`, \`tabBar\`, \`stepper\`) —
  \`Selected / Not selected / Disabled / Error\`. \`toggleButton\` y
  \`checkbox\` fuerzan \`focus: false\` cuando están \`disabled\`.
- **Switch** (\`switch\`) — \`On / Off / Disabled / Error\`. \`switch\`
  fuerza \`focus: false\` cuando está \`disabled\`.
- **Text inputs** (\`textField\`, \`passwordField\`, \`searchField\`,
  \`numberField\`, \`dateField\`, \`textArea\`) — \`Enabled / Disabled /
  Error / Filled / Read only\`.
- **Expandable** (\`accordion\`, \`dropdown\`) — \`Expanded / Collapsed /
  Disabled / Error\`. \`dropdown\` propone \`focus\` y \`reading\` cuando
  está \`expanded\`.

## Referencia de estados

Los 11 estados del plugin, ordenados por uso:

| Estado         | Label         | Cuándo usarlo                                                                         |
| -------------- | ------------- | ------------------------------------------------------------------------------------- |
| \`enabled\`      | Enabled       | El elemento está disponible para interactuar (estado por defecto de interactivos).    |
| \`disabled\`     | Disabled      | El elemento no acepta interacción (visualmente apagado o bloqueado).                  |
| \`error\`        | Error         | El elemento está en estado de error (campo inválido, acción fallida).                 |
| \`read-only\`    | Read only     | El elemento muestra información pero no se puede editar (input bloqueado).            |
| \`filled\`       | Filled        | Un input ya tiene valor introducido.                                                  |
| \`on\`           | On            | Switch en posición activa.                                                            |
| \`off\`          | Off           | Switch en posición inactiva.                                                          |
| \`selected\`     | Selected      | Elemento seleccionable que está actualmente seleccionado (tab, checkbox, toggle).     |
| \`not-selected\` | Not selected  | Elemento seleccionable que no está seleccionado.                                      |
| \`expanded\`     | Expanded      | Accordion, dropdown o panel colapsable que está abierto.                              |
| \`collapsed\`    | Collapsed     | Accordion, dropdown o panel colapsable que está cerrado.                              |

Recuerda: qué estados puedes elegir depende del rol. Un \`Heading\` no
tiene selector de estado; un \`Button\` no puede estar \`Selected\`; un
\`Switch\` no puede estar \`Expanded\`. El plugin filtra
automáticamente.

## Settings

El icono de **⚙ engranaje** en la cabecera abre Settings como modal.
Mismo modal en los dos modos del plugin.

### Apariencia

Tres ajustes de presentación:

- **Theme** — seis opciones:
  - **System** — sigue el tema del sistema operativo.
  - **Paper** — tema claro cálido.
  - **Graphite** — tema oscuro neutro.
  - **Sky** — tema claro con acentos azules.
  - **Ocean** — tema oscuro con acentos azules.
  - **Leaf** — tema con acentos verdes.
- **Density** — dos niveles:
  - **Compact** — espaciado reducido, más filas visibles por pantalla.
  - **Normal** — espaciado estándar, más aire entre filas.
- **Font size** — rango discreto de 8pt a 24pt (valores disponibles:
  8, 10, 12, 14, 16, 18, 20, 22, 24).

### Idioma

Un selector con cinco idiomas:

- **Català**
- **English**
- **Español**
- **Euskara**
- **Galego**

El cambio es instantáneo — todos los textos del plugin se recargan
en el idioma elegido.

### About

Tres filas:

- **Version** — la versión instalada del plugin (hoy V0.7.8).
- **Changelog** — abre un modal con el CHANGELOG.md del proyecto
  renderizado como markdown.
- **Help** — abre un modal con este propio README renderizado como
  markdown. Si estás leyendo esto dentro del plugin, estás en ese
  modal.

### Zona de peligro

Acciones destructivas que eliminan metadata. Todas pasan por un
diálogo de confirmación con checkbox obligatorio ("I understand this
action cannot be undone"):

- **Clear selected node / Clear selected nodes** — elimina la
  metadata del nodo (o nodos) seleccionados y de todos sus
  descendientes. Solo está habilitado si hay selección y esa selección
  tiene metadata.
- **Clear current page** — elimina toda la metadata de todos los nodos
  de la página actual.
- **Clear entire document** — elimina toda la metadata de todas las
  páginas del archivo.

Tras ejecutar, el plugin muestra un feedback con el contador
\`Cleared N key(s) from {scope}.\`. No hay undo desde el plugin (sí
desde el undo nativo de Figma con Cmd+Z).

> ⚠️ **Atención**: a diferencia del botón **Limpiar** del footer —
> que preserva la baseline heredada con sentinels \`null\` — las
> acciones de Danger Zone borran literalmente el pluginData. Úsalas
> con cuidado, especialmente \`Clear entire document\`.

## Tips y mejores prácticas

Consejos de uso que ahorran tiempo y evitan dolor.

**Taggea primero en los componentes del design system.** Las
instancias heredan automáticamente — si taggeas una vez en el
componente origen, todas las instancias que viven en las pantallas
reciben los tags sin trabajo manual. Es el multiplicador más
importante del plugin. Invierte tiempo en el DS, recoge frutos en las
pantallas.

**Usa atributos personalizados para lo que no encaja.** \`aria-describedby\`,
referencias a live regions, estados visuales que no están en la
matriz estándar, identificadores de analytics: todo eso cabe como par
clave+valor. Pero no abuses: si algo se usa muchas veces, propón un
campo estructurado antes que acumular custom attributes.

**Marca frecuentemente.** El borrador local vive en memoria de UI: si
recargas el plugin (Cmd+Option+P) o cierras y vuelves a abrir sin
marcar, pierdes lo que no hayas persistido. No acumules sesiones
enteras de edición sin confirmar. Marca después de cada componente o
cada sección lógica.

**Genera el blueprint antes del handoff.** Los devs pueden consultar
la Vista de specs con el plugin abierto, pero el **blueprint
nativo** vive en el panel de Inspect sin depender del plugin. Si el
equipo de desarrollo está acostumbrado a inspeccionar en Dev Mode sin
plugins extra, el blueprint es el formato que van a ver por defecto.
Genéralo (o regenéralo) antes de anunciar que la pantalla está
lista.

**Usa las flechas, no números.** Nunca tienes que escribir un orden
de reading o focus a mano. Si el orden no queda como quieres, mueve
las filas con las flechas del cluster derecho: el plugin recalcula
toda la cascada. Los únicos números que vas a ver son los que
aparecen en los pills \`R\` y \`F\` (y esos se actualizan solos).

**Recarga rápido con Cmd+Option+P.** En Figma Desktop, el atajo
\`Cmd+Option+P\` re-ejecuta el último plugin usado. Si estás iterando en
el código del plugin (o en la pantalla), es más rápido que ir al
menú.

**Confía en los defaults.** Cuando asignas un rol, el plugin propone
valores razonables. No los cambies salvo que tengas motivo. Por
ejemplo, un \`Button\` viene con focus + reading activos por defecto:
eso es correcto en el 95% de los casos. No desactives reading por
costumbre; deja que el plugin guíe.

## 🛠 Cómo ponerlo a funcionar en tu Figma

El plugin todavía no está publicado en la Figma Community. Para usarlo hay
que clonar el repositorio y ejecutarlo localmente en modo desarrollador.
Es más sencillo de lo que suena: son cuatro comandos y unos clics en Figma.

### Requisitos previos

Necesitas tres cosas instaladas en tu ordenador:

#### 1. Node.js 20 o superior (incluye \`npm\`)

| Sistema operativo         | Cómo instalarlo                                                |
| ------------------------- | -------------------------------------------------------------- |
| **macOS**                 | \`brew install node\` (requiere [Homebrew](https://brew.sh))     |
| **Linux (Debian/Ubuntu)** | \`sudo apt update && sudo apt install nodejs npm\`               |
| **Windows**               | Descarga el instalador desde [nodejs.org](https://nodejs.org)  |
| **Otros**                 | [nodejs.org](https://nodejs.org) tiene paquetes para casi todo |

Verifica que se instaló correctamente abriendo una terminal y ejecutando:

\`\`\`bash
node --version    # debe mostrar v20.x.x o superior
npm --version
\`\`\`

#### 2. Figma Desktop

El plugin **no funciona en Figma web**. Necesitas la aplicación de escritorio.
Descárgala desde [figma.com/downloads](https://www.figma.com/downloads/).

#### 3. Git (probablemente ya lo tienes)

Si no lo tienes:

| Sistema operativo         | Cómo instalarlo                                                 |
| ------------------------- | --------------------------------------------------------------- |
| **macOS**                 | \`brew install git\`                                              |
| **Linux (Debian/Ubuntu)** | \`sudo apt install git\`                                          |
| **Windows**               | Descarga el [instalador oficial](https://git-scm.com/downloads) |

### Instalación del plugin

Abre una terminal y ejecuta, uno detrás de otro, estos tres comandos:

\`\`\`bash
git clone git@github.com:roger6vi/A11Y-Copilot.git
cd A11Y-Copilot
npm install
\`\`\`

**¿Qué hace \`npm install\`?** Descarga automáticamente **todas las dependencias
del plugin** dentro de una carpeta \`node_modules/\` que se crea en el repositorio.
No tienes que instalar nada más por separado — un solo comando lo deja todo listo.
Esto incluye, entre otras:

- **vite** — el bundler que compila el código del plugin
- **plugma** — el wrapper que conecta vite con Figma
- **react** y **react-dom** — la librería de UI
- **typescript** — el compilador de tipos
- **tailwindcss** — los estilos
- **@radix-ui/\\*** — los componentes accesibles base

Si todo va bien, al terminar \`npm install\` deberías ver un mensaje del tipo
\`added N packages\` (el número exacto puede variar) y la nueva carpeta
\`node_modules/\` aparecerá dentro del repositorio.

### Ponerlo a funcionar en Figma

El plugin necesita un proceso de desarrollo activo durante todo el tiempo
que lo uses. Si cierras ese proceso, el plugin deja de estar disponible
en Figma.

**Paso 1** — En la misma terminal, dentro de la carpeta del repositorio,
deja ejecutándose:

\`\`\`bash
npm run dev
\`\`\`

**No cierres esa terminal.** Mientras esté abierta, el plugin está disponible.

**Paso 2** — Abre Figma Desktop (no la versión web).

**Paso 3** — En el menú superior de Figma selecciona:

\`Plugins → Development → Import plugin from manifest…\`

**Paso 4** — En el diálogo que abre Figma, selecciona este archivo dentro
del repositorio que acabas de clonar:

\`\`\`text
A11Y-Copilot/dist-dev/manifest.json
\`\`\`

> ⚠️ **Atención**: tienes que elegir el \`manifest.json\` que está dentro de
> la carpeta \`dist-dev/\` (la que genera \`npm run dev\` en caliente), **no**
> el del directorio raíz ni el de \`dist/\`. Los tres existen pero cumplen
> funciones distintas: \`manifest.json\` en la raíz es la fuente del build,
> \`dist/\` contiene el último release publicado (V0.7.8), y \`dist-dev/\` es
> el que Figma carga mientras desarrollas con hot reload activo.

**Paso 5** — Listo. A partir de ahora, para ejecutar el plugin en cualquier
archivo de Figma:

\`Plugins → Development → A11Y Copilot\`

### Notas útiles

- Mientras \`npm run dev\` esté ejecutándose, cualquier cambio en el código
  se refleja automáticamente. Si ya tienes el plugin abierto en Figma,
  ciérralo y vuélvelo a abrir para ver los cambios.
- Si cierras la terminal de \`npm run dev\` y quieres volver a usar el plugin,
  ejecuta de nuevo \`npm run dev\` en la carpeta del repositorio. No hace
  falta volver a importar el manifest en Figma: Figma recuerda la ruta.
- Si Figma muestra un error al importar el manifest, verifica que hayas
  ejecutado \`npm install\` primero y que \`npm run dev\` esté ejecutándose
  en una terminal.
